<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Sessão da Tarde - Portfólio Retro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');

        body {
            background-color: #2b003d;
            background-image: linear-gradient(180deg, #2b003d 0%, #1a0021 100%);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: #00f2ff;
            text-shadow: 4px 4px #ff00de, 7px 7px #000;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.8rem;
            line-height: 1.6;
        }

        .container {
            background: rgba(15, 15, 15, 0.9);
            padding: 30px;
            border: 5px solid #ff00de;
            box-shadow: 0 0 20px #ff00de, inset 0 0 15px #ff00de;
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #000;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #ff00de;
            box-shadow: 0 0 10px #ff00de;
        }

        #btn-cadastrar {
            width: 100%;
            padding: 18px;
            background-color: #ff00de;
            border: none;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            margin-top: 10px;
            text-shadow: 2px 2px #000;
            box-shadow: 4px 4px 0px #7a006a;
        }

        #btn-cadastrar:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #7a006a;
        }

        #btn-cadastrar:hover {
            background-color: #00f2ff;
            color: #000;
            box-shadow: 0 0 25px #00f2ff;
            text-shadow: none;
        }

        table {
            width: 100%;
            margin-top: 40px;
            border-collapse: collapse;
            background: #000;
            border: 2px solid #00f2ff;
        }

        th, td {
            padding: 15px;
            border: 1px solid #444;
            text-align: left;
        }

        th {
            background-color: #3d0036;
            color: #ff00de;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-family: 'Press Start 2P', cursive;
        }

        tr:nth-child(even) {
            background-color: #111;
        }

        tr:hover {
            background-color: #222;
        }

        .neon-text {
            color: #00f2ff;
        }
    </style>
</head>
<body>

    <h1>CINE NOSTALGIA<br>SESSÃO DA TARDE</h1>

    <div class="container">
        <form id="formulario-filme">
            <div class="form-group">
                <label for="titulo">Título do Filme</label>
                <input type="text" id="titulo" placeholder="Ex: Elvira, a Rainha das Trevas" required>
            </div>
            <div class="form-group">
                <label for="ano">Ano de Lançamento</label>
                <input type="number" id="ano" placeholder="Ex: 1988" required>
            </div>
            <div class="form-group">
                <label for="genero">Gênero</label>
                <input type="text" id="genero" placeholder="Ex: Terrir / Comédia" required>
            </div>
            <div class="form-group">
                <label for="diretor">Diretor</label>
                <input type="text" id="diretor" placeholder="Ex: James Signorelli" required>
            </div>
            <button type="submit" id="btn-cadastrar">CADASTRAR FILME</button>
        </form>

        <table id="tabela-filmes">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ano</th>
                    <th>Gênero</th>
                    <th>Diretor</th>
                </tr>
            </thead>
            <tbody>
                <!-- Os dados cadastrados aparecerão aqui -->
            </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('formulario-filme');
        const tabela = document.getElementById('tabela-filmes').getElementsByTagName('tbody')[0];

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            // Captura dos valores usando os IDs definidos
            const titulo = document.getElementById('titulo').value;
            const ano = document.getElementById('ano').value;
            const genero = document.getElementById('genero').value;
            const diretor = document.getElementById('diretor').value;

            // Criação da nova linha na tabela
            const novaLinha = tabela.insertRow();

            novaLinha.insertCell(0).textContent = titulo;
            novaLinha.insertCell(1).textContent = ano;
            novaLinha.insertCell(2).textContent = genero;
            novaLinha.insertCell(3).textContent = diretor;

            // Limpa os campos do formulário após o cadastro
            form.reset();
            document.getElementById('titulo').focus();
        });
    </script>
</body>
</html>
